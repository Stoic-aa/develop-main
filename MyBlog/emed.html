<!DOCTYPE html>
<html class="scroll-smooth" lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TechEditorial | 物联网/嵌入式</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;family=Inter:wght@300;400;500;600;700&amp;family=Fira+Code:wght@400;500&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed-dim": "#bec6e0",
                        "surface-tint": "#0053db",
                        "on-primary-container": "#eeefff",
                        "surface-dim": "#d8dadc",
                        "on-primary-fixed": "#00174b",
                        "on-tertiary-fixed": "#131b2e",
                        "background": "#f7f9fb",
                        "tertiary": "#4d556b",
                        "surface-bright": "#f7f9fb",
                        "secondary-fixed-dim": "#b9c7df",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-fixed": "#d5e3fc",
                        "outline": "#737686",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#0d1c2e",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#dae2fd",
                        "secondary": "#515f74",
                        "on-surface": "#191c1e",
                        "surface-variant": "#e0e3e5",
                        "surface": "#f7f9fb",
                        "primary": "#004ac6",
                        "on-secondary-fixed-variant": "#3a485b",
                        "on-surface-variant": "#434655",
                        "tertiary-container": "#656d84",
                        "on-secondary-container": "#57657a",
                        "inverse-primary": "#b4c5ff",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary-fixed-variant": "#3f465c",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c3c6d7",
                        "secondary-container": "#d5e3fc",
                        "inverse-surface": "#2d3133",
                        "on-tertiary-container": "#eef0ff",
                        "primary-fixed": "#dbe1ff",
                        "on-background": "#191c1e",
                        "primary-container": "#2563eb",
                        "inverse-on-surface": "#eff1f3",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-container-high": "#e6e8ea",
                        "surface-container": "#eceef0",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "PingFang SC", "Microsoft YaHei", "sans-serif"],
                        "body": ["Manrope", "PingFang SC", "Microsoft YaHei", "sans-serif"],
                        "label": ["Inter", "PingFang SC", "Microsoft YaHei", "sans-serif"],
                        "mono": ["Fira Code", "ui-monospace", "SFMono-Regular"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .no-line-container {
            border: none !important;
        }

        .article-title-hover {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .group:hover .article-title-hover {
            transform: translateY(-4px) scale(1.02);
        }
    </style>

    <script>
        // 页面加载完成后插入 header 组件
        document.addEventListener('DOMContentLoaded', function () {
            fetch('components/header.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                })
                .catch(error => console.error('Error loading header:', error));
        });
    </script>

    <script>
        // 页面加载完成后插入 header 组件
        document.addEventListener('DOMContentLoaded', function () {
            fetch('components/sidebar.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('sidebar-placeholder').innerHTML = data;
                })
                .catch(error => console.error('Error loading header:', error));
        });
    </script>

    <script>
        // 页面加载完成后插入 header 组件
        document.addEventListener('DOMContentLoaded', function () {
            fetch('components/footer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                })
                .catch(error => console.error('Error loading header:', error));
        });
    </script>

    <script src="js/articles-data.js"></script>
    <script src="js/main.js"></script>

</head>

<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
    <!-- TopNavBar -->
    <!-- 从components/header.html中加载 -->
    <div id="header-placeholder"></div>

    <div class="flex min-h-screen pt-16">
        <!-- SideNavBar -->
        <!-- 从components/sidebar.html中加载 -->
        <div id="sidebar-placeholder"></div>
        <!-- Main Content Area -->
        <main class="flex-1 ml-0 lg:ml-64 px-4 sm:px-8 py-12 flex justify-center">
            <div class="max-w-[850px] w-full space-y-24">
                <!-- Hero Section -->
                <section class="space-y-6">
                    <h1
                        class="text-5xl sm:text-6xl font-headline font-bold text-on-surface tracking-tighter leading-tight">
                        重塑数字 <span class="text-primary">基石</span>
                    </h1>
                    <p class="text-xl text-on-surface-variant font-body leading-relaxed max-w-2xl">
                        深入探讨底层系统、优雅的 UI 架构以及软硬件的交汇点。为现代工程师提供的密集的硬核知识。
                    </p>
                </section>
                <!-- Blog List -->
                <div class="space-y-16">
                    <!-- 文章列表将通过JavaScript动态生成 -->
                </div>
                <!-- Pagination/Load More -->
                <div class="pt-12 flex justify-center">
                    <button
                        class="px-8 py-3 bg-surface-container-lowest text-on-surface font-headline font-bold text-sm tracking-widest border border-outline-variant/10 rounded-full hover:bg-primary hover:text-on-primary transition-all duration-300 shadow-sm">
                        加载历史存档
                    </button>
                </div>
            </div>
            <!-- Right Sidebar - Blog Info & Trends -->
            <aside class="hidden xl:block w-72 ml-12 space-y-10">
                <!-- Blog Stats -->
                <div class="p-6 rounded-2xl bg-surface-container-low space-y-6">
                    <h3 class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant">站点数据
                    </h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <p class="text-2xl font-black text-primary font-headline">248</p>
                            <p class="text-[10px] uppercase font-label text-outline">文章总数</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-2xl font-black text-primary font-headline">12k</p>
                            <p class="text-[10px] uppercase font-label text-outline">订阅用户</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-2xl font-black text-primary font-headline">1.4M</p>
                            <p class="text-[10px] uppercase font-label text-outline">总浏览量</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-2xl font-black text-primary font-headline">4.9</p>
                            <p class="text-[10px] uppercase font-label text-outline">综合评分</p>
                        </div>
                    </div>
                </div>
                <!-- Trending Topics -->
                <div class="space-y-4">
                    <h3 class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant px-2">
                        热门趋势</h3>
                    <div class="space-y-2">
                        <a class="block p-3 rounded-xl hover:bg-surface-container-high transition-colors group"
                            href="#">
                            <p class="text-xs text-primary font-bold mb-1">#内核开发</p>
                            <p class="text-sm font-semibold text-on-surface line-clamp-2">Linux 6.8 中的内存分页优化</p>
                        </a>
                        <a class="block p-3 rounded-xl hover:bg-surface-container-high transition-colors group"
                            href="#">
                            <p class="text-xs text-primary font-bold mb-1">#硬件</p>
                            <p class="text-sm font-semibold text-on-surface line-clamp-2">专为工程师打造的定制机械键盘 PCB</p>
                        </a>
                        <a class="block p-3 rounded-xl hover:bg-surface-container-high transition-colors group"
                            href="#">
                            <p class="text-xs text-primary font-bold mb-1">#AI伦理</p>
                            <p class="text-sm font-semibold text-on-surface line-clamp-2">LLM 训练周期的环境成本分析</p>
                        </a>
                    </div>
                </div>
                <!-- Newsletter Card -->
                <div class="p-6 rounded-2xl bg-primary text-on-primary space-y-4 shadow-xl shadow-primary/20">
                    <span class="material-symbols-outlined text-3xl">mail</span>
                    <h3 class="text-xl font-headline font-bold leading-tight">每周协议</h3>
                    <p class="text-sm text-on-primary/80 font-body">每周日早晨，我们将前三篇技术深度文章直接发送到您的邮箱。</p>
                    <input
                        class="w-full bg-white/10 border-none rounded-lg text-sm text-white placeholder:text-white/40 py-2 focus:ring-1 focus:ring-white"
                        placeholder="email@example.com" type="email" />
                    <button
                        class="w-full bg-white text-primary py-2 rounded-lg font-bold text-xs uppercase tracking-widest hover:bg-primary-fixed transition-colors">加入订阅</button>
                </div>
            </aside>
        </main>
    </div>
    <!-- Footer -->
    <!-- 从components/footer.html中加载 -->
    <div id="footer-placeholder"></div>
    <!-- FAB -->
    <button
        class="fixed bottom-8 right-8 w-14 h-14 bg-primary text-on-primary rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50 lg:hidden">
        <span class="material-symbols-outlined">edit</span>
    </button>
</body>

</html>
