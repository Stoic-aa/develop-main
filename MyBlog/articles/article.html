<!DOCTYPE html>
<html class="scroll-smooth" lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title id="article-title">TechEditorial</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        // 这里复制你现有的颜色配置
                        "tertiary-fixed-dim": "#bec6e0",
                        "surface-tint": "#0053db",
                        // ... 其他颜色
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "PingFang SC", "Microsoft YaHei", "sans-serif"],
                        "body": ["Manrope", "PingFang SC", "Microsoft YaHei", "sans-serif"],
                        "label": ["Inter", "PingFang SC", "Microsoft YaHei", "sans-serif"],
                        "mono": ["Fira Code", "ui-monospace", "SFMono-Regular"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .article-content h1,
        .article-content h2,
        .article-content h3 {
            margin-top: 1.5em;
            margin-bottom: 1em;
        }

        .article-content p {
            margin-bottom: 1em;
            line-height: 1.8;
        }

        .article-content img {
            margin: 1.5em 0;
            border-radius: 0.5rem;
        }

        .article-content pre {
            background-color: #f0f2f5;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 1.5em 0;
        }
    </style>
</head>

<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed"
    data-category="">
    <!-- 复制你的导航栏代码 -->
    <header
        class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm shadow-blue-900/5 transition-all duration-300">
        <!-- 你的导航栏代码 -->
    </header>

    <div class="flex min-h-screen pt-16">
        <!-- 复制你的侧边栏代码 -->
        <aside
            class="h-screen w-64 fixed left-0 top-0 pt-20 flex flex-col gap-y-2 bg-slate-50 dark:bg-slate-950 border-r border-slate-200/50 dark:border-slate-800/50 font-label font-medium text-sm hidden lg:flex">
            <!-- 你的侧边栏代码 -->
        </aside>

        <!-- 主内容区域 -->
        <main class="flex-1 ml-10 lg:ml-408 px-4 sm:px-8 py-12">
            <article class="max-w-4xl mx-auto w-full">
                <header class="mb-8">
                    <div
                        class="flex items-center gap-3 text-xs font-label text-primary font-bold tracking-widest uppercase mb-4">
                        <span id="category-tag" class="category-tag"></span>
                        <span class="w-1 h-1 bg-outline-variant rounded-full"></span>
                        <span id="publish-date" class="text-on-surface-variant font-medium publish-date"></span>
                    </div>
                    <h1 id="article-title-display"
                        class="text-4xl font-headline font-bold text-on-surface mb-4 article-title"></h1>
                    <div class="flex items-center gap-4 pt-4 border-t border-outline-variant/20">
                        <div class="flex items-center gap-2">
                            <img id="author-avatar" class="w-8 h-8 rounded-full author-avatar" alt="" />
                            <span id="author-name" class="text-sm font-medium text-on-surface author-name"></span>
                        </div>
                        <span id="read-time" class="text-sm text-outline font-label read-time"></span>
                    </div>
                </header>

                <div id="article-content" class="article-content text-on-surface-variant"></div>

                <footer class="mt-12 pt-8 border-t border-outline-variant/20">
                    <div class="flex flex-wrap gap-2 tags-section" id="tags-section">
                        <!-- 标签将通过JS动态添加 -->
                    </div>

                    <div class="mt-8 flex justify-between items-center">
                        <div class="flex gap-4 social-actions">
                            <button class="p-2 hover:bg-surface-container-low rounded-full transition-colors like-btn">
                                <span class="material-symbols-outlined text-on-surface-variant">favorite</span>
                            </button>
                            <button class="p-2 hover:bg-surface-container-low rounded-full transition-colors share-btn">
                                <span class="material-symbols-outlined text-on-surface-variant">share</span>
                            </button>
                        </div>
                        <div id="last-update" class="text-sm text-on-surface-variant last-updated"></div>
                    </div>
                </footer>
            </article>
        </main>
    </div>

    <!-- 复制你的页脚代码 -->
    <footer
        class="w-full py-12 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 transition-all duration-200">
        <!-- 你的页脚代码 -->
    </footer>

    <!-- 引入markdown-it库 -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script src="js/articles-data.js"></script>
    <script src="js/article-renderer.js"></script>
</body>

</html>
