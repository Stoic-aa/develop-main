<header
    class="fixed top-0 left-0 w-full z-[60] bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm shadow-blue-900/5 transition-all duration-300">
    <div class="flex justify-between items-center h-16 px-6 max-w-7xl mx-auto font-label text-sm tracking-tight">
        <div class="flex items-center gap-8">
            <a class="text-xl font-bold tracking-tighter text-slate-900 dark:text-white font-headline"
                href="index.html">
                TechEditorial
            </a>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-blue-700 dark:text-blue-400 font-semibold border-b-2 border-blue-600 pb-1"
                    href="index.html">最新文章</a>
                <a class="text-slate-600 dark:text-slate-400 hover:text-blue-600 transition-all duration-300"
                    href="#">存档</a>
                <a class="text-slate-600 dark:text-slate-400 hover:text-blue-600 transition-all duration-300"
                    href="#">订阅通讯</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button id="mobile-menu-button" aria-label="打开菜单"
                class="p-2 hover:bg-slate-100/50 rounded-full transition-transform active:opacity-80 scale-95 md:hidden">
                <span class="material-symbols-outlined text-on-surface-variant">menu</span>
            </button>
            <div class="relative group hidden sm:block">
                <span
                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">search</span>
                <input
                    class="bg-surface-container-low border-none rounded-full pl-10 pr-4 py-1.5 text-xs w-48 focus:ring-2 focus:ring-primary transition-all"
                    placeholder="搜索深度洞察..." type="text"
                    onkeyup="if(event.key === 'Enter') window.performSearch(this.value)" />
            </div>
            <button class="p-2 hover:bg-slate-100/50 rounded-full transition-transform active:opacity-80 scale-95">
                <span class="material-symbols-outlined text-on-surface-variant">notifications</span>
            </button>
            <button class="p-2 hover:bg-slate-100/50 rounded-full transition-transform active:opacity-80 scale-95">
                <span class="material-symbols-outlined text-on-surface-variant">settings</span>
            </button>
            <img alt="用户头像" class="w-8 h-8 rounded-full border border-outline-variant/20 shadow-sm"
                data-alt="Close up of a professional male avatar" src="./picture/author.png" />
        </div>
    </div>
</header>

<!-- Mobile sidebar overlay -->
<div id="mobile-sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"></div>
