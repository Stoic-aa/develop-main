<!DOCTYPE html>
<html class="scroll-smooth" lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TechEditorial | 技术社论</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed-dim": "#bec6e0",
                        "surface-tint": "#0053db",
                        "on-primary-container": "#eeefff",
                        "surface-dim": "#d8dadc",
                        "on-primary-fixed": "#00174b",
                        "on-tertiary-fixed": "#131b2e",
                        "background": "#f7f9fb",
                        "tertiary": "#4d556b",
                        "surface-bright": "#f7f9fb",
                        "secondary-fixed-dim": "#b9c7df",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-fixed": "#d5e3fc",
                        "outline": "#737686",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#0d1c2e",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#dae2fd",
                        "secondary": "#515f74",
                        "on-surface": "#191c1e",
                        "surface-variant": "#e0e3e5",
                        "surface": "#f7f9fb",
                        "primary": "#004ac6",
                        "on-secondary-fixed-variant": "#3a485b",
                        "on-surface-variant": "#434655",
                        "tertiary-container": "#656d84",
                        "on-secondary-container": "#57657a",
                        "inverse-primary": "#b4c5ff",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary-fixed-variant": "#3f465c",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c3c6d7",
                        "secondary-container": "#d5e3fc",
                        "inverse-surface": "#2d3133",
                        "on-tertiary-container": "#eef0ff",
                        "primary-fixed": "#dbe1ff",
                        "on-background": "#191c1e",
                        "primary-container": "#2563eb",
                        "inverse-on-surface": "#eff1f3",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-container-high": "#e6e8ea",
                        "surface-container": "#eceef0",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "PingFang SC", "Microsoft YaHei", "sans-serif"],
                        "body": ["Manrope", "PingFang SC", "Microsoft YaHei", "sans-serif"],
                        "label": ["Inter", "PingFang SC", "Microsoft YaHei", "sans-serif"],
                        "mono": ["Fira Code", "ui-monospace", "SFMono-Regular"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .no-line-container {
            border: none !important;
        }

        .article-title-hover {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .group:hover .article-title-hover {
            transform: translateY(-4px) scale(1.02);
        }

        /* 移动端抽屉菜单样式 */
        #mobile-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 240px;
            height: 100vh;
            background: white;
            box-shadow: rgba(0, 0, 0, 0.2) 0 4px 12px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 50;
            padding: 2rem 0;
        }

        #mobile-sidebar.open {
            transform: translateX(0);
        }

        .sidebar-toggle {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 60;
            background: #004ac6;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .sidebar-toggle:hover {
            background: #003ea8;
        }

        @media (min-width: 1024px) {
            .sidebar-toggle {
                display: none;
            }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            try {
                const [headerHtml, sidebarHtml, footerHtml, rightSidebarHtml] = await Promise.all([
                    fetch('components/header.html').then(r => r.text()),
                    fetch('components/sidebar.html').then(r => r.text()),
                    fetch('components/footer.html').then(r => r.text()),
                    fetch('components/right-sidebar.html').then(r => r.text())
                ]);

                document.getElementById('header-placeholder').innerHTML = headerHtml;
                document.getElementById('sidebar-placeholder').innerHTML = sidebarHtml;
                document.getElementById('footer-placeholder').innerHTML = footerHtml;

                const placeholders = document.querySelectorAll('.right-sidebar-placeholder');
                placeholders.forEach(placeholder => {
                    placeholder.innerHTML = rightSidebarHtml;
                });

                // 初始化搜索
                const searchInput = document.querySelector('input[placeholder*="搜索"]');
                if (searchInput) {
                    searchInput.addEventListener('keypress', function (e) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            if (typeof performSearch === 'function') {
                                performSearch(this.value);
                            }
                        }
                    });
                }

                // 延迟执行导航高亮
                setTimeout(() => {
                    if (typeof setActiveNav === 'function') {
                        setActiveNav();
                    }
                }, 0);

            } catch (error) {
                console.error('Error loading components:', error);
            }
        });

        // 控制移动端抽屉菜单
        function toggleSidebar() {
            const sidebar = document.getElementById('mobile-sidebar');
            sidebar.classList.toggle('open');
        }
    </script>

    <script src="js/articles-data.js"></script>
    <script src="js/main.js"></script>
</head>

<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
    <!-- TopNavBar -->
    <div id="header-placeholder"></div>

    <!-- 侧边栏占位符 -->
    <div id="sidebar-placeholder"></div>

    <!-- 移动端抽屉菜单 -->
    <div id="mobile-sidebar">
        <button class="sidebar-toggle" onclick="toggleSidebar()">
            <span class="material-symbols-outlined">close</span>
        </button>
        <!-- 这里会由 sidebar.html 动态填充 -->
    </div>

    <!-- 主内容区域 -->
    <div class="flex min-h-screen pt-16 lg:ml-64">
        <main class="flex-1 ml-0 lg:ml-64 px-4 sm:px-8 py-12 flex justify-center">
            <div class="max-w-4xl w-full space-y-16">
                <!-- 特色文章 -->
                <section id="featured-article-section" class="mb-16"></section>

                <!-- 分类卡片 -->
                <section class="mb-20">
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                        <div
                            class="bg-surface-container-low p-6 rounded-xl hover:bg-surface-bright transition-colors group">
                            <span class="material-symbols-outlined text-primary mb-4 text-3xl">router</span>
                            <h3 class="font-headline font-bold text-on-surface text-lg">物联网</h3>
                            <p class="text-xs text-on-surface-variant font-label uppercase tracking-wider mt-1">IoT Hub
                            </p>
                        </div>
                        <div
                            class="bg-surface-container-low p-6 rounded-xl hover:bg-surface-bright transition-colors group">
                            <span class="material-symbols-outlined text-primary mb-4 text-3xl">memory</span>
                            <h3 class="font-headline font-bold text-on-surface text-lg">嵌入式系统</h3>
                            <p class="text-xs text-on-surface-variant font-label uppercase tracking-wider mt-1">Hardware
                                Lab</p>
                        </div>
                        <div
                            class="bg-surface-container-low p-6 rounded-xl hover:bg-surface-bright transition-colors group">
                            <span
                                class="material-symbols-outlined text-primary mb-4 text-3xl">precision_manufacturing</span>
                            <h3 class="font-headline font-bold text-on-surface text-lg">自动驾驶</h3>
                            <p class="text-xs text-on-surface-variant font-label uppercase tracking-wider mt-1">
                                Self-Driving AI</p>
                        </div>
                        <div
                            class="bg-surface-container-low p-6 rounded-xl hover:bg-surface-bright transition-colors group">
                            <span class="material-symbols-outlined text-primary mb-4 text-3xl">directions_car</span>
                            <h3 class="font-headline font-bold text-on-surface text-lg">汽车电子</h3>
                            <p class="text-xs text-on-surface-variant font-label uppercase tracking-wider mt-1">Vehicle
                                Systems</p>
                        </div>
                    </div>
                </section>

                <!-- 最新技术动态 -->
                <div class="flex-1">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="font-headline text-2xl font-bold tracking-tight">最新技术动态</h2>
                        <a href="#"
                            class="text-primary font-label text-xs font-bold uppercase tracking-widest flex items-center gap-1 hover:gap-2 transition-all">
                            查看全部 <span class="material-symbols-outlined text-sm">arrow_forward</span>
                        </a>
                    </div>
                    <div class="space-y-10">
                        <!-- 文章将由 JavaScript 渲染 -->
                    </div>
                </div>
            </div>

            <!-- 右侧边栏占位符 -->
            <div class="right-sidebar-placeholder"></div>
        </main>
    </div>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- FAB 按钮 -->
    <button
        class="fixed bottom-8 right-8 w-14 h-14 bg-primary text-on-primary rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50 lg:hidden">
        <span class="material-symbols-outlined">edit</span>
    </button>

    <!-- 移动端菜单按钮 -->
    <button class="sidebar-toggle" onclick="toggleSidebar()">
        <span class="material-symbols-outlined">menu</span>
    </button>
</body>

</html>
